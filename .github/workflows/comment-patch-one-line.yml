{"name":"Comment Patch","on":{"issue_comment":{"types":["created"]}},"permissions":{"contents":"write","issues":"read"},"jobs":{"apply":{"if":"${{ contains(github.event.comment.body, '/apply-patch') && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR') }}","runs-on":"ubuntu-latest","steps":[{"name":"Checkout main","uses":"actions/checkout@v4","with":{"ref":"main","fetch-depth":0,"token":"${{ secrets.GITHUB_TOKEN }}"}},{"name":"Extract script from comment","run":"set -euo pipefail\n\npython3 <<'PY'\nimport json\nimport re\nfrom pathlib import Path\n\nevent = json.loads(Path(\"${{ github.event_path }}\").read_text())\nbody = event[\"comment\"][\"body\"]\n\nmatch = re.search(r\"```(?:bash|sh)\\s*\\n(.*?)\\n```\", body, re.S)\n\nif not match:\n    raise SystemExit(\"No fenced bash block found. Use ```bash ... ```\")\n\nscript = match.group(1).strip() + \"\\n\"\nPath(\"/tmp/comment-patch.sh\").write_text(script, encoding=\"utf-8\")\n\nprint(\"=== script preview ===\")\nprint(script[:4000])\nPY"},{"name":"Run comment script","run":"set -euo pipefail\nbash /tmp/comment-patch.sh"},{"name":"Setup Node","uses":"actions/setup-node@v4","with":{"node-version":22}},{"name":"Build app","run":"set -euo pipefail\ncd app\nnpm install --no-audit --no-fund\nnpm run build"},{"name":"Commit and push","run":"set -euo pipefail\n\ngit config user.name \"github-actions[bot]\"\ngit config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\n\ngit add -A\n\nif git diff --cached --quiet; then\n  echo \"No changes to commit\"\n  exit 0\nfi\n\ngit commit -m \"apply comment patch\"\ngit push origin HEAD:main"}]}}}