name: Patch File

on:
  workflow_dispatch:
    inputs:
      patch_url:
        description: "Raw patch URL"
        required: true
        type: string
      commit_message:
        description: "Commit message"
        required: false
        default: "apply patch"
        type: string

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download patch
        run: |
          set -euo pipefail
          curl -L "${{ inputs.patch_url }}" -o /tmp/mobile.patch
          echo "=== patch preview ==="
          sed -n '1,200p' /tmp/mobile.patch

      - name: Apply patch
        run: |
          set -euo pipefail
          git apply --whitespace=fix /tmp/mobile.patch

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build app
        run: |
          set -euo pipefail
          cd app
          npm install --no-audit --no-fund
          npm run build

      - name: Commit and push
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "${{ inputs.commit_message }}"
          git push origin HEAD:main