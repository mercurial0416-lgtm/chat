name: Mobile Patch

on:
  workflow_dispatch:
    inputs:
      patch_b64:
        description: "PATCH_B64 붙여넣기"
        required: true
        type: string
      commit_message:
        description: "커밋 메시지"
        required: false
        default: "mobile patch"
        type: string

permissions:
  contents: write

concurrency:
  group: mobile-patch-main
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply patch
        run: |
          set -euo pipefail

          printf '%s' '${{ inputs.patch_b64 }}' | base64 -d > /tmp/mobile_patch.sh
          sed -i 's/\r$//' /tmp/mobile_patch.sh

          echo "=== patch preview ==="
          head -n 40 /tmp/mobile_patch.sh || true

          echo "=== run patch ==="
          bash /tmp/mobile_patch.sh

      - name: Build app
        run: |
          set -e
          cd app

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          npm run build

      - name: Commit and push
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "${{ inputs.commit_message }}"
          git push origin HEAD:main

          echo "LOCAL:"
          git rev-parse HEAD

          echo "REMOTE:"
          git ls-remote origin refs/heads/main
