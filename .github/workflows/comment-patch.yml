name: Comment Patch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read

jobs:
  apply:
    if: ${{ contains(github.event.comment.body, '/apply-patch') && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract script from comment
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import re
          from pathlib import Path

          event = json.loads(Path("${{ github.event_path }}").read_text())
          body = event["comment"]["body"]

          match = re.search(r"```(?:bash|sh)\s*\n(.*?)\n```", body, re.S)

          if not match:
              raise SystemExit("No fenced bash block found. Use ```bash ... ```")

          script = match.group(1).strip() + "\n"
          Path("/tmp/comment-patch.sh").write_text(script, encoding="utf-8")

          print("=== script preview ===")
          print(script[:4000])
          PY

      - name: Run comment script
        run: |
          set -euo pipefail
          bash /tmp/comment-patch.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build app
        run: |
          set -euo pipefail
          cd app
          npm install --no-audit --no-fund
          npm run build

      - name: Commit and push
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "apply comment patch"
          git push origin HEAD:main
