name: Comment Patch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read

jobs:
  apply:
    if: >
      github.event.comment.user.login == github.repository_owner &&
      contains(github.event.comment.body, '/apply-patch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract patch from comment
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import re
          from pathlib import Path

          event = json.loads(Path("${{ github.event_path }}").read_text())
          body = event["comment"]["body"]

          match = re.search(r"```(?:diff|patch)?\s*\n(.*?)\n```", body, re.S)

          if not match:
              raise SystemExit("No fenced patch block found. Use ```diff ... ```")

          patch = match.group(1).strip() + "\n"
          Path("/tmp/comment.patch").write_text(patch, encoding="utf-8")

          print("=== patch preview ===")
          print(patch[:4000])
          PY

      - name: Apply patch
        run: |
          set -euo pipefail
          git apply --whitespace=fix /tmp/comment.patch

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build app
        run: |
          set -euo pipefail
          cd app
          npm install --no-audit --no-fund
          npm run build

      - name: Commit and push
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "apply comment patch"
          git push origin HEAD:main